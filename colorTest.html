<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>測試通用設計 - 顏色</title>
</head>

<body>
    <div class="text-primary text-center display-1">primary</div>
    <div class="text-secondary text-end h1">secondary</div>
    <div class="text-success fs-1 fw-bold">success</div>
    <div class="text-danger fs-2 fw-bolder">danger</div>
    <div class="text-warning">warning</div>
    <div class="text-info text-decoration-underline">info</div>
    <div class="text-info-emphasis fs-3 fw-bold">info-emphasis</div>
    <div class="bg-black text-white">白字</div>
    <div class="bg-black text-light">接近白字的灰字</div>
    <div class="bg-light text-black">黑字</div>
    <div class="bg-light text-dark">接近黑字的灰字</div>
    <div class="bg-dark text-light">灰底灰字</div>
    <div class="bg-primary text-light fs-4">primary</div>
    <div class="bg-secondary text-light fs-4">secondary</div>
    <div class="bg-success text-light fs-4">success</div>
    <div class="bg-danger text-light fs-4">danger</div>
    <div class="bg-warning text-light fs-4">warning</div>
    <div class="bg-info text-light fs-4">info</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
