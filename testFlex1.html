<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Bootstrap Flexbox</title>
</head>

<body>
    <div class="container py-3">
        <div class="pool bg-primary-subtle p-1 d-flex gap-2 mb-2">
            <div class="frog bg-success text-light p-2 rounded-2">1</div>
            <div class="frog bg-success text-light p-2 rounded-2">2</div>
            <div class="frog bg-success text-light p-2 rounded-2">3</div>
        </div>
        <!-- 反向 -->
        <div class="pool bg-primary-subtle p-1 d-flex flex-row-reverse gap-2 mb-2">
            <div class="frog bg-success text-light p-2 rounded-2">1</div>
            <div class="frog bg-success text-light p-2 rounded-2">2</div>
            <div class="frog bg-success text-light p-2 rounded-2">3</div>
        </div>

        <div class="pool bg-primary-subtle p-1 d-flex justify-content-end gap-2 mb-2">
            <div class="frog bg-success text-light p-2 rounded-2">1</div>
            <div class="frog bg-success text-light p-2 rounded-2">2</div>
            <div class="frog bg-success text-light p-2 rounded-2">3</div>
        </div>

        <div class="pool bg-primary-subtle p-1 d-flex justify-content-center gap-2 mb-2">
            <div class="frog bg-success text-light p-2 rounded-2">1</div>
            <div class="frog bg-success text-light p-2 rounded-2">2</div>
            <div class="frog bg-success text-light p-2 rounded-2">3</div>
        </div>

        <div class="pool bg-primary-subtle p-1 d-flex justify-content-start gap-2 mb-2">
            <div class="frog bg-success text-light p-2 rounded-2">1</div>
            <div class="frog bg-success text-light p-2 rounded-2">2</div>
            <div class="frog bg-success text-light p-2 rounded-2">3</div>
        </div>

        <!-- between -->
        <div class="pool bg-primary-subtle p-1 d-flex justify-content-between gap-2 mb-2">
            <div class="frog bg-success text-light p-2 rounded-2">1</div>
            <div class="frog bg-success text-light p-2 rounded-2">2</div>
            <div class="frog bg-success text-light p-2 rounded-2">3</div>
        </div>

        <!-- around: gutter 的行為, 均分左右的空間 -->
        <div class="pool bg-primary-subtle p-1 d-flex justify-content-around gap-2 mb-2">
            <div class="frog bg-success text-light p-2 rounded-2">1</div>
            <div class="frog bg-success text-light p-2 rounded-2">2</div>
            <div class="frog bg-success text-light p-2 rounded-2">3</div>
        </div>

        <!-- evenly: 均分所有空間 -->
        <div class="pool bg-primary-subtle p-1 d-flex justify-content-evenly gap-2 mb-2">
            <div class="frog bg-success text-light p-2 rounded-2">1</div>
            <div class="frog bg-success text-light p-2 rounded-2">2</div>
            <div class="frog bg-success text-light p-2 rounded-2">3</div>
        </div>


        <!-- 推擠 -->
        <div class="pool bg-primary-subtle p-1 d-flex gap-2 mb-2">
            <div class="frog bg-success text-light p-2 rounded-2">1</div>
            <div class="frog bg-success text-light p-2 rounded-2">2</div>
            <div class="frog bg-success text-light p-2 rounded-2 ms-auto">3</div>
        </div>

        <div class="pool bg-primary-subtle p-1 d-flex gap-2 mb-2">
            <div class="frog bg-success text-light p-2 rounded-2">1</div>
            <div class="frog bg-success text-light p-2 rounded-2 me-auto">2</div>
            <div class="frog bg-success text-light p-2 rounded-2">3</div>
        </div>

        <!-- 使用情境: 導覽列的排法 -->
        <ul class="d-flex justify-content-between list-unstyled">
            <li class="me-auto">Yahoo!</li>
            <li>選項2</li>
            <li>選項3</li>
            <li class="ms-auto">搜尋</li>
        </ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
