<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        html,
        body {
            height: 100%;
        }

        .box {
            height: 100px;
            background-color: #abf8f5;
            margin-bottom: 10px;
        }
    </style>
    <title>Bootstrap 格線系統</title>
</head>

<body>
    <!-- 超過 12 會怎麼樣 -->
    <div class="container mb-5">
        <div class="row">
            <div class="col">
                <div class="box">1</div>
            </div>
            <div class="col">
                <div class="box">2</div>
            </div>
            <div class="col">
                <div class="box">3</div>
            </div>
            <div class="col">
                <div class="box">4</div>
            </div>
            <div class="col">
                <div class="box">5</div>
            </div>
        </div>
    </div>


    <!-- 左三右不指定的欄位頁面  -->
    <div class="container h-100">
        <div class="row h-100">
            <div class="col-3 h-100">
                <div class="bg-warning-subtle h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-warning-subtle h-100"></div>
            </div>
        </div>
    </div>

    <!-- 建立具 3 欄的頁面  -->
    <!-- .container.h-100>.row.h-100>.col*3.h-100>.bg-warning.h-100 -->
    <div class="container h-100">
        <div class="row h-100">
            <div class="col h-100">
                <div class="bg-warning h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-warning h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-warning h-100"></div>
            </div>
        </div>
    </div>

    <!-- 建立具 12 欄的頁面  -->
    <!-- .container.h-100>.row.h-100>.col*12.h-100>.bg-danger.h-100 -->
    <div class="container h-100">
        <div class="row h-100">
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
            <div class="col h-100">
                <div class="bg-danger h-100"></div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
